[env]
GHCR_IMAGE = "ghcr.io/ckoliber/envcontainer"
DOCKER_IMAGE = "ckoliber/envcontainer"
GIT_CLIFF_CONFIG = "{{ config_root }}/.github/cliff.toml"

[tools]
gh = "2.95.0"
git-cliff = "2.13.1"
"aqua:docker/cli" = "29.5.3"
"aqua:docker/buildx" = "0.35.0"

[tasks.build]
run = ".github/build.sh"

[tasks.release]
file = ".github/release.sh"
